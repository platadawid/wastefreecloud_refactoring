<nav *ngIf="visible" class="topbar navbar" [ngClass]="topbarClass">
  <div class="container-fluid topbar-inner">
    <a class="navbar-brand brand text-white" routerLink="/portal">
      <span class="brand-desktop">{{ 'topbar.portalTitle' | translate }}</span>
      <span class="brand-mobile">{{ 'topbar.portalTitleMobile' | translate }}</span>
    </a>

    <div class="topbar-content">
      <div class="d-flex align-items-center gap-2">
        <!-- Inbox - always visible -->
        <div class="inbox-slot" *ngIf="currentUser.user()">
          <button class="inbox-pill link" (click)="openInbox()" [title]="('topbar.openInbox' | translate)" [ngClass]="{'jiggle': animateInbox}">
            <img src="/assets/images/bell.svg" alt="inbox" width="18" height="18" class="inbox-icon" aria-hidden="true" />
            <span class="inbox-count" *ngIf="inbox.counter()">{{ inbox.counter() }}</span>
          </button>
        </div>

        <!-- Wallet - always visible -->
        <div class="wallet-slot" *ngIf="(walletBalance$ | async) !== null">
          <a class="wallet-pill link" routerLink="/portal/wallet" [title]="('topbar.openWallet' | translate)">
            <img src="/assets/images/wallet.svg" alt="wallet" width="18" height="18" class="wallet-icon" aria-hidden="true" />
            <div class="wallet-value">
              <div class="amount">{{ (walletBalance$ | async) | number:'1.2-2' }}</div>
              <div class="currency">PLN</div>
            </div>
          </a>
        </div>

        <!-- Language switcher - always visible -->
        <div class="lang-slot">
          <app-language-switcher></app-language-switcher>
        </div>

        <!-- User info - always visible -->
        <div class="user-info" *ngIf="currentUser.user() as u">
          <div class="user-pill">
            <a routerLink="/portal/profile" class="user-link" [title]="('topbar.profile' | translate)">
              <ng-container *ngIf="!avatarFailed && avatarUrlOrFallback(u) as avatar; else defaultAvatar">
                <img [src]="avatar" alt="" width="36" height="36" class="user-avatar-img" (error)="onAvatarError()" (load)="onAvatarLoad()" />
              </ng-container>
              <ng-template #defaultAvatar>
                <div class="user-avatar-fallback" aria-hidden="true">{{ (u.username || '?').slice(0,1).toUpperCase() }}</div>
              </ng-template>
              <div class="user-text">
                <div class="name">{{ u.username }}</div>
                <div class="role">{{ roleKeyMap[u.role] | translate }}</div>
              </div>
            </a>
            <button class="logout-btn" (click)="logout()" [title]="('topbar.logout' | translate)">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              <span class="d-none d-lg-inline">{{ 'topbar.logout' | translate }}</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>
